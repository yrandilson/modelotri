<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste HIRO</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <a-scene embedded vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="luminaria" src="luminaria.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Cubo laranja simples -->
            <a-box position="0 0.5 0" color="#D4603A" scale="1 1 1"></a-box>
            <!-- Luminária por cima do cubo -->
            <a-entity gltf-model="#luminaria" position="0 0 0" scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
