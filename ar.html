<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminária Balança — Realidade Aumentada</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0px; overflow: hidden; }
      #back {
        position: fixed; top: 1rem; left: 1rem; z-index: 999;
        background: rgba(42,24,16,0.85); color: #C8A050;
        padding: 0.5rem 1rem; border-radius: 50px;
        font-family: sans-serif; font-size: 0.8rem;
        text-decoration: none; border: 1px solid #C8A050;
      }
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2A1810; color: #C8A050; z-index: 998;
        display: flex; align-items: center; justify-content: center;
        font-family: sans-serif; font-size: 0.95rem; text-align: center;
        padding: 2rem; box-sizing: border-box;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a id="back" href="index.html">← Voltar ao site</a>
    <div id="loading">Carregando modelo 3D…<br/>Aponte a câmera para o marcador da balança</div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-assets>
        <a-asset-item id="luminaria-model" src="luminaria.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-marcador_balanca_raw__1_.patt" emitevents="true" id="marcador-balanca">
        <a-entity
          gltf-model="#luminaria-model"
          scale="1 1 1"
          position="0 0 0"
          rotation="0 0 0"
          animation-mixer="loop: repeat"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('#marcador-balanca');
      const loading = document.querySelector('#loading');
      marker.addEventListener('markerFound', () => { loading.style.display = 'none'; });
      marker.addEventListener('markerLost', () => { loading.style.display = 'flex'; });
      // some browsers fire scene loaded before assets; hide loading once model is ready too
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('loaded', () => {
        setTimeout(() => { loading.style.display = 'none'; }, 4000);
      });
    </script>
  </body>
</html>
