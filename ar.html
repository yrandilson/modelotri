<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luminária Balança — Realidade Aumentada</title>

  <!-- CORREÇÃO 1: AR.js deve vir ANTES do A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #141C2B; }

    #back {
      position: fixed; top: 1rem; left: 1rem; z-index: 999;
      background: rgba(20,28,43,0.9); color: #E8DFC8;
      padding: 0.5rem 1.1rem; border-radius: 50px;
      font-family: sans-serif; font-size: 0.8rem;
      text-decoration: none; border: 1px solid rgba(232,223,200,0.3);
      display: flex; align-items: center; gap: 0.4rem;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #back:hover { background: rgba(212,96,58,0.85); border-color: #D4603A; }

    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #141C2B; color: #E8DFC8; z-index: 998;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; font-size: 0.95rem; text-align: center;
      padding: 2rem; gap: 1.5rem;
    }
    .loading-title {
      font-size: 1.4rem; font-weight: 700; color: #E8DFC8;
    }
    .loading-subtitle {
      color: rgba(232,223,200,0.5); font-size: 0.85rem; line-height: 1.7;
      max-width: 300px;
    }

    .scan-ring {
      width: 100px; height: 100px; position: relative; margin: 0 auto;
    }
    .scan-ring::before, .scan-ring::after {
      content: ''; position: absolute;
      border: 2px solid #D4603A; border-radius: 4px;
    }
    .scan-ring::before {
      top: 0; left: 0; width: 30px; height: 30px;
      border-right: none; border-bottom: none;
    }
    .scan-ring::after {
      bottom: 0; right: 0; width: 30px; height: 30px;
      border-left: none; border-top: none;
    }
    .scan-inner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
    }
    .scan-line {
      position: absolute; left: 10px; right: 10px; height: 2px;
      background: linear-gradient(90deg, transparent, #D4603A, transparent);
      animation: scanline 2s ease-in-out infinite;
      top: 10px;
    }
    @keyframes scanline {
      0%, 100% { top: 10px; opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { top: 90px; }
    }

    .steps {
      display: flex; flex-direction: column; gap: 0.6rem;
      width: 100%; max-width: 280px; text-align: left;
    }
    .step {
      display: flex; align-items: flex-start; gap: 0.75rem;
      background: rgba(255,255,255,0.04); border-radius: 6px;
      padding: 0.65rem 0.9rem; border: 1px solid rgba(255,255,255,0.06);
    }
    .step-num {
      width: 22px; height: 22px; border-radius: 3px;
      background: rgba(212,96,58,0.2); border: 1px solid #D4603A;
      color: #D4603A; font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: monospace;
    }
    .step p { font-size: 0.8rem; color: rgba(232,223,200,0.7); line-height: 1.5; }

    #status {
      display: none;
      position: fixed; top: 1rem; right: 1rem; z-index: 999;
      background: rgba(20,28,43,0.9); color: #7A9E8E;
      padding: 0.4rem 0.9rem; border-radius: 50px;
      font-family: sans-serif; font-size: 0.75rem;
      border: 1px solid rgba(122,158,142,0.4);
      backdrop-filter: blur(8px);
      align-items: center; gap: 0.4rem;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7A9E8E; animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #error-msg {
      display: none; position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%); z-index: 999;
      background: rgba(212,96,58,0.9); color: #fff;
      padding: 0.75rem 1.5rem; border-radius: 8px;
      font-family: sans-serif; font-size: 0.85rem; text-align: center;
      max-width: 300px; line-height: 1.5;
    }
  </style>
</head>
<body>

  <a id="back" href="index.html">← Voltar ao site</a>

  <div id="status">
    <div class="status-dot"></div>
    Marcador detectado
  </div>

  <div id="loading">
    <div class="loading-title">Luminária Balança</div>
    <div class="scan-ring">
      <div class="scan-inner">⚖️</div>
      <div class="scan-line"></div>
    </div>
    <p class="loading-subtitle">Aponte a câmera para o marcador impresso da balança</p>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <p>Imprima o marcador da balança (disponível no site)</p>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <p>Permita o acesso à câmera quando solicitado</p>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <p>Aponte a câmera para o marcador — a luminária 3D aparecerá!</p>
      </div>
    </div>
  </div>

  <div id="error-msg"></div>

  <!--
    CORREÇÃO 2: detectionMode trocado de "mono_and_matrix" para "mono"
    O marcador é do tipo "pattern" (imagem), não matriz/QR.
    "mono_and_matrix" com matrixCodeType conflita com pattern markers.
  -->
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false"
  >

    <a-assets timeout="30000">
      <!-- CORREÇÃO 3: caminho do GLB com ./ explícito para evitar ambiguidade -->
      <a-asset-item id="luminaria-model" src="./luminaria.glb"></a-asset-item>
    </a-assets>

    <a-marker
      type="pattern"
      url="./pattern-marcador_balanca_raw.patt"
      emitevents="true"
      id="marcador-balanca"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <!--
        CORREÇÃO 4: removido animation-mixer="loop: repeat" (só funciona se o GLB
        tiver animações embutidas do Blender). Substituído por animação A-Frame
        de rotação, que funciona sempre independente do GLB ter animação ou não.
        Se o seu GLB TEM animação do Blender, pode adicionar animation-mixer de volta.
      -->
      <a-entity
        gltf-model="#luminaria-model"
        scale="0.5 0.5 0.5"
        position="0 0.3 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const marker  = document.querySelector('#marcador-balanca');
    const loading = document.querySelector('#loading');
    const status  = document.querySelector('#status');
    const errorEl = document.querySelector('#error-msg');

    // Marcador encontrado → esconde loading, mostra badge verde
    marker.addEventListener('markerFound', () => {
      loading.style.display = 'none';
      status.style.display  = 'flex';
    });

    // Marcador perdido → volta tela de instrução
    marker.addEventListener('markerLost', () => {
      loading.style.display = 'flex';
      status.style.display  = 'none';
    });

    // Erro de câmera
    if (navigator.mediaDevices) {
      navigator.mediaDevices.getUserMedia({ video: true }).catch(() => {
        errorEl.textContent = '⚠️ Câmera não autorizada. Permita o acesso nas configurações do navegador e recarregue a página.';
        errorEl.style.display = 'block';
      });
    }

    // Erro de carregamento do modelo GLB
    const asset = document.querySelector('#luminaria-model');
    asset.addEventListener('error', () => {
      errorEl.textContent = '⚠️ Modelo 3D não encontrado (luminaria.glb). Verifique se o arquivo está no repositório.';
      errorEl.style.display = 'block';
    });
  </script>

</body>
</html>
