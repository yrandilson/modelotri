<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Teste — Sem GLB</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }
      #info {
        position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
        z-index: 999; background: rgba(0,0,0,0.8); color: #fff;
        padding: 0.5rem 1.2rem; border-radius: 20px;
        font-family: sans-serif; font-size: 0.85rem; text-align: center;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="info">📷 Aponte para o marcador da balança</div>

    <!--
      CORREÇÃO PRINCIPAL:
      - trackingMethod: best  → deixa o AR.js escolher o melhor método
      - markersAreaEnabled: true → ATIVA detecção de marcadores (estava false!)
      - sourceType: webcam
      - detectionMode: mono
    -->
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam;
            trackingMethod: best;
            detectionMode: mono;
            markersAreaEnabled: true;
            debugUIEnabled: false;"
      renderer="antialias: true; logarithmicDepthBuffer: true;"
      loading-screen="enabled: false"
    >
      <a-marker
        type="pattern"
        url="./pattern-marcador_balanca_raw.patt"
        emitevents="true"
        id="marcador-balanca"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.05"
      >
        <!-- Caixa laranja simples para testar detecção -->
        <a-box
          position="0 0.5 0"
          scale="1 1 1"
          color="#D4603A"
        ></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('#marcador-balanca');
      const info   = document.querySelector('#info');

      marker.addEventListener('markerFound', () => {
        info.textContent = '✅ Marcador detectado!';
        info.style.background = 'rgba(46,204,113,0.9)';
        console.log('MARCADOR ENCONTRADO!');
      });

      marker.addEventListener('markerLost', () => {
        info.textContent = '📷 Aponte para o marcador da balança';
        info.style.background = 'rgba(0,0,0,0.8)';
      });
    </script>
  </body>
</html>
